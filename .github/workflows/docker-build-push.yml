name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish (for example, v0.7.0)
        required: true
        default: v0.7.0
        type: string

env:
  DOCKERHUB_REPO: camemb3rt/kikoeru

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Select release version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name || inputs.version }}"
          VERSION="${VERSION#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: camemb3rt/kikoeru-quasar
          path: frontend
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          build-contexts: |
            frontend=frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_REPO }}:v${{ steps.version.outputs.value }}
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.value }}
            ${{ env.DOCKERHUB_REPO }}:latest
